<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="mobile.css">
<title>Past Events — EventVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f4f3ef;
  --border: #e8e6df;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #b0aea8;
  --accent: #2d5be3;
  --accent2: #e35d2d;
  --accent3: #2da868;
  --accent4: #e3a82d;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; }
a { color:inherit; text-decoration:none; }

header {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100; padding:0 40px;
}
.header-inner { display:flex; align-items:center; justify-content:space-between; height:64px; max-width:1200px; margin:0 auto; }
.logo { font-family:'Fraunces',serif; font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.logo span { color:var(--accent); }

.container { max-width:1200px; margin:0 auto; padding:40px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
.section-title { font-family:'Fraunces',serif; font-size:28px; font-weight:700; }
.section-title em { color:var(--accent); font-style:italic; }

.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 20px; border-radius:10px; font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all 0.2s; border:none; text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#2450cc; transform:translateY(-1px); box-shadow:0 4px 12px rgba(45,91,227,0.3); }
.btn-outline { background:transparent; border:2px solid var(--border); color:var(--text2); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }

.events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; }
.event-card {
  background: #ffffff;
  border: 1px solid var(--border); border-radius: 16px;
  overflow:hidden; transition:all 0.4s;
  position:relative; display:flex; flex-direction:column;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  opacity: 0.85;
}
.event-card:hover { opacity: 1; transform: translateY(-4px); }

.event-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: var(--bg-img);
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  z-index: 0;
}

.event-card-top { padding:24px; flex-grow:1; position: relative; z-index: 1; }
.event-card-cat { 
  display:inline-block; font-size:10px; font-weight:800; letter-spacing:1px; 
  text-transform:uppercase; padding:4px 10px; border-radius:30px; 
  font-family:'Space Mono',monospace; margin-bottom:12px;
  background: var(--surface2); border: 1px solid var(--border);
}
.event-card h3 { font-size:20px; font-weight:800; margin-bottom:12px; font-family: 'Fraunces', serif; }
.event-meta { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.event-meta-item { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text2); font-family:'Space Mono',monospace; }

.event-card-bottom { padding:16px 24px; background: rgba(0,0,0,0.02); border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position: relative; z-index: 1; }
.badge-past { background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }

.empty-state { text-align:center; padding:100px 20px; color:var(--text2); grid-column: 1 / -1; }
.empty-icon { font-size:64px; margin-bottom:16px; }

@media(max-width:768px) {
  .container { padding:20px; }
  .events-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Event<span>Vault</span></div>
    <a href="index.html" class="btn btn-primary">← Back to Home</a>
  </div>
</header>

<div class="container">
  <div class="section-header">
    <div class="section-title">Completed <em>Past Events</em></div>
  </div>

  <div class="events-grid" id="past-events-grid">
    <div class="empty-state">Loading past events...</div>
  </div>
</div>

<script>
const API = '/api';

async function loadPastEvents() {
  try {
    const r = await fetch(API + '/events?isSupportiveTeam=false');
    const events = await r.json();
    const now = new Date();
    
    // Filter for past events
    const pastEvents = events.filter(e => {
      const evDate = new Date(e.date);
      evDate.setHours(23, 59, 59, 999);
      return evDate < now;
    }).sort((a, b) => new Date(b.date) - new Date(a.date)); // Newest past first

    const grid = document.getElementById('past-events-grid');
    
    if (!pastEvents.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div>No past events found.</div></div>';
      return;
    }

    const imageMap = {
      'technical': 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80',
      'sports': 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=800&q=80',
      'cultural': 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80',
      'academic': 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=800&q=80',
      'academics': 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=800&q=80',
      'education': 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=800&q=80',
      'community': 'https://images.unsplash.com/photo-1559027615-cd9d732ffadd?auto=format&fit=crop&w=800&q=80',
      'community-based': 'https://images.unsplash.com/photo-1559027615-cd9d732ffadd?auto=format&fit=crop&w=800&q=80',
      'community based': 'https://images.unsplash.com/photo-1559027615-cd9d732ffadd?auto=format&fit=crop&w=800&q=80',
      'general': 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?auto=format&fit=crop&w=800&q=80'
    };

    grid.innerHTML = pastEvents.map(ev => {
      const evDate = new Date(ev.date);
      const lookupCat = (ev.category || 'general').trim().toLowerCase();
      const eventImg = imageMap[lookupCat] || imageMap['general'];
      
      return `
      <div class="event-card" style="--bg-img: url('${eventImg}')">
        <div class="event-card-top">
          <div class="event-card-cat">${ev.category || 'General'}</div>
          <h3>${ev.title}</h3>
          <div class="event-meta">
            <div class="event-meta-item"><span>📅</span>${evDate.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</div>
            <div class="event-meta-item"><span>📍</span>${ev.location}</div>
          </div>
          <div style="font-size:13px; color:var(--text2); line-height:1.5;">${ev.description || 'No description provided.'}</div>
        </div>
        <div class="event-card-bottom">
          <span class="badge-past">Completed</span>
          <div style="font-size:12px; font-weight:700; color:var(--text2)">${ev.participantCount || 0} Attended</div>
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    document.getElementById('past-events-grid').innerHTML = '<div class="empty-state">Error loading events: ' + e.message + '</div>';
  }
}

loadPastEvents();
</script>

</body>
</html>
