<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="mobile.css">
<title>Upcoming Events — EventVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f4f3ef;
  --border: #e8e6df;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #b0aea8;
  --accent: #2d5be3;
  --accent2: #e35d2d;
  --accent3: #2da868;
  --accent4: #e3a82d;
  --brand-red: #8b0000;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; overflow-x: hidden; }
a { color:inherit; text-decoration:none; }

header {
  background:rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); 
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100; padding:0 40px;
}
.header-inner { display:flex; align-items:center; justify-content:space-between; height:64px; max-width:1200px; margin:0 auto; }
.logo { font-family:'Fraunces',serif; font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.logo span { color:var(--accent); }

.container { max-width:1200px; margin:0 auto; padding:40px; }
.section { padding:24px 0; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
.section-title { font-family:'Fraunces',serif; font-size:28px; font-weight:700; position: relative; }
.section-title::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 40px; height: 4px; background: var(--accent); border-radius: 2px; }
.section-title em { color:var(--accent); font-style:italic; }

.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 20px; border-radius:10px; font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all 0.3s var(--ease); border:none; text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#2450cc; transform:translateY(-2px); box-shadow:0 6px 20px rgba(45,91,227,0.3); }
.btn-pink { background:#fce4ec; border:2px solid #f8bbd0; color:#c2185b; }
.btn-pink:hover { background:#f8bbd0; color:#fff; transform: translateY(-2px); }
.btn-sm { padding:6px 14px; font-size:13px; }

/* FILTERS */
.filters { display:flex; flex-direction: column; gap:16px; margin-bottom:32px; }
.filter-group { display:flex; gap:10px; flex-wrap:wrap; align-items: center; }
.filter-chip { padding:8px 20px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.3s var(--ease); }
.filter-chip:hover { border-color:var(--accent); color:var(--accent); transform: translateY(-2px); }
.filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow: 0 4px 12px rgba(45,91,227,0.2); }

/* SEARCH BAR */
.search-bar-container { margin-bottom: 32px; position: relative; max-width: 100%; }
.search-bar {
  width: 100%; padding: 14px 16px 14px 48px; border-radius: 16px;
  border: 2px solid var(--border); background: var(--surface);
  font-family: 'Nunito', sans-serif; font-size: 15px; transition: all 0.3s var(--ease);
  color: var(--text);
}
.search-bar:focus { outline: none; border-color: var(--accent); box-shadow: 0 8px 24px rgba(45,91,227,0.12); }
.search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text3); }

/* EVENT CARDS */
.events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:24px; }
.event-card {
  background: #ffffff;
  border: 1px solid var(--border); border-radius: 20px;
  overflow:hidden; transition:all 0.5s var(--ease); cursor:pointer;
  position:relative; display:flex; flex-direction:column;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}
.event-card:hover { transform:translateY(-8px); box-shadow: 0 20px 48px rgba(45,91,227,0.12); }
.event-card::before {
  content: ""; position: absolute; inset: 0; background-image: var(--bg-img);
  background-size: cover; background-position: center; opacity: 0.12; z-index: 0;
}
.event-card-top { padding:16px; flex-grow:1; position: relative; z-index: 1; }
.event-card-cat { 
  display:inline-block; font-size:9px; font-weight:800; letter-spacing:1px; 
  text-transform:uppercase; padding:4px 10px; border-radius:30px; 
  font-family:'Space Mono',monospace; margin-bottom:10px;
  background: rgba(255,255,255,0.9); border: 1px solid var(--border);
}
.event-card h3 { font-size:18px; font-weight:800; line-height:1.2; margin-bottom:10px; font-family: 'Fraunces', serif; }
.event-meta { 
  display:grid; grid-template-columns: 1fr; gap:6px; margin-bottom:12px; 
  padding:12px; background: rgba(255,255,255,0.7); border-radius: 12px; border: 1px solid var(--border);
}
.event-meta-item { display:flex; align-items:center; gap:8px; font-size:12px; font-family:'Space Mono',monospace; font-weight:700; }
.event-card-bottom { padding:12px 16px; background: rgba(255,255,255,0.6); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position: relative; z-index: 1; }
.slots-count { font-weight: 800; font-size: 10px; background: rgba(45,91,227,0.08); padding: 4px 8px; border-radius: 8px; }
.event-days-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; font-family: 'Space Mono', monospace; }
.days-soon { background: #fee2e2; color: #dc2626; }
.days-upcoming { background: #e0f2fe; color: #0369a1; }

/* TOAST */
.toast-container { position:fixed; top:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:12px; }
.toast { background:rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border:1px solid var(--border); border-radius:16px; padding:16px 20px; font-size:14px; min-width:320px; box-shadow: 0 12px 32px rgba(0,0,0,0.1); display:flex; align-items:center; gap:12px; border-left: 6px solid var(--accent); }
.toast.success { border-left-color:var(--accent3); }
.toast.error { border-left-color:#dc2626; }

@media(max-width:768px) {
  header { padding:0 16px; }
  .container { padding: 20px 16px; }
  .events-grid { grid-template-columns: 1fr; gap: 16px; }
  .section-title { font-size: 24px; }
  .filters { gap: 12px; }
  .filter-group { gap: 8px; overflow-x: auto; padding-bottom: 8px; width: 100%; white-space: nowrap; flex-wrap: nowrap; }
  .filter-chip { padding: 6px 16px; font-size: 12px; }
  .search-bar { padding: 12px 12px 12px 40px; font-size: 14px; }
  .event-card-top { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Event<span>Vault</span></div>
    <a href="index.html" class="btn btn-primary btn-sm">← Home</a>
  </div>
</header>

<div class="container">
  <section class="section">
    <div class="section-header">
      <div class="section-title">Upcoming <em>Events</em></div>
    </div>

    <div class="filters" id="cat-filters">
      <div class="filter-group">
        <span class="filter-chip active" onclick="filterCat('all',this)">All</span>
        <span class="filter-chip" onclick="filterCat('General',this)">General</span>
        <span class="filter-chip" onclick="filterCat('Cultural',this)">Cultural</span>
        <span class="filter-chip" onclick="filterCat('Technical',this)">Technical</span>
        <span class="filter-chip" onclick="filterCat('Sports',this)">Sports</span>
        <span class="filter-chip" onclick="filterCat('Community',this)">Community</span>
      </div>
    </div>

    <div class="search-bar-container">
      <span class="search-icon">🔍</span>
      <input type="text" id="event-search" class="search-bar" placeholder="Search events by name, location, or description..." oninput="handleSearch(this.value)" autocomplete="off">
    </div>

    <div class="events-grid" id="events-grid">
      <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">Loading events...</div>
    </div>
  </section>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/api';
let allEvents = [], currentCat = 'all', searchQuery = '';

async function loadEvents() {
  try {
    const r = await fetch(API + '/events?isSupportiveTeam=false');
    allEvents = await r.json();
    renderEvents();
  } catch(e) { toast(e.message, 'error'); }
}

function handleSearch(q) {
  searchQuery = q.toLowerCase();
  renderEvents();
}

function filterCat(cat, el) {
  if (cat !== 'all') {
    window.location.href = `category-events.html?cat=${cat}`;
    return;
  }
  currentCat = cat;
  el.parentElement.querySelectorAll('.filter-chip').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const now = new Date();
  let list = allEvents.filter(e => {
    const evDate = new Date(e.date);
    evDate.setHours(23, 59, 59, 999);
    return evDate >= now;
  });

  if (currentCat !== 'all') {
    list = list.filter(e => (e.category || '').toLowerCase() === currentCat.toLowerCase());
  }
  
  if (searchQuery) {
    list = list.filter(e => 
      e.title.toLowerCase().includes(searchQuery) || 
      (e.description && e.description.toLowerCase().includes(searchQuery)) ||
      (e.location && e.location.toLowerCase().includes(searchQuery))
    );
  }

  const grid = document.getElementById('events-grid');
  if (!list.length) { 
    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #6b6860;">No events found.</div>'; 
    return; 
  }

  const imageMap = {
    'technical': 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80',
    'sports': 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=800&q=80',
    'cultural': 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80',
    'academic': 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=800&q=80',
    'community': 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=800&q=80',
    'general': 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?auto=format&fit=crop&w=800&q=80'
  };

  grid.innerHTML = list.map(ev => {
    const evDate = new Date(ev.date);
    const daysUntil = Math.ceil((evDate - now) / 86400000);
    const lookupCat = (ev.category || 'general').trim().toLowerCase();
    const eventImg = imageMap[lookupCat] || imageMap['general'];
    
    let daysBadge = '';
    if (daysUntil <= 3) daysBadge = `<span class="event-days-badge days-soon">🔥 In ${daysUntil}d</span>`;
    else daysBadge = `<span class="event-days-badge days-upcoming">In ${daysUntil} days</span>`;

    return `
    <div class="event-card" onclick="window.location.href='/choice/${ev.eventId}'" style="--bg-img: url('${eventImg}')">
      <div class="event-card-top">
        <div class="event-card-cat">${ev.category || 'General'}</div>
        <h3>${ev.title}</h3>
        <div class="event-meta">
          <div class="event-meta-item"><span>📅</span>${evDate.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</div>
          <div class="event-meta-item"><span>🕐</span>${ev.time}</div>
          <div class="event-meta-item"><span>📍</span>${ev.location}</div>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;">Register Now →</button>
      </div>
      <div class="event-card-bottom">
        <div class="slots-count">${(ev.roles || []).reduce((s, r) => s + (r.slots - r.filled), 0)} slots open</div>
        ${daysBadge}
      </div>
    </div>`;
  }).join('');
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

loadEvents();
</script>
</body>
</html>
