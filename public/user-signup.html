<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="mobile.css">
<title>User Signup — EventVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Fraunces:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f4f3ef;
  --border: #e8e6df;
  --text: #1a1916;
  --text2: #6b6860;
  --accent: #2d5be3;
  --radius: 20px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow-x: hidden; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  animation: slideUp 0.8s var(--ease);
  position: relative;
}
.back-btn {
  position: absolute;
  top: 24px;
  left: 24px;
  color: var(--text2);
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s var(--ease);
}
.back-btn:hover { color: var(--accent); transform: translateX(-4px); }

.logo { font-family:'Fraunces',serif; font-size:28px; font-weight:700; margin-bottom:8px; text-align: center; }
.logo span { color:var(--accent); }
.subtitle { text-align: center; color: var(--text2); margin-bottom: 32px; font-size: 14px; font-family: 'Space Mono', monospace; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { margin-bottom: 20px; }
.full-width { grid-column: 1 / -1; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.form-group input, .form-group select { 
  width: 100%; 
  background: var(--surface2); 
  border: 2px solid transparent; 
  border-radius: 12px; 
  padding: 12px 16px; 
  color: var(--text); 
  font-family: 'Nunito', sans-serif; 
  font-size: 15px; 
  outline: none; 
  transition: all 0.3s var(--ease); 
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); background: #fff; box-shadow: 0 4px 16px rgba(45,91,227,0.08); }

.radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.radio-card { 
  border: 2px solid var(--border); 
  border-radius: 14px; 
  padding: 16px; 
  cursor: pointer; 
  transition: all 0.3s var(--ease); 
  text-align: center;
}
.radio-card:hover { border-color: var(--accent); background: rgba(45,91,227,0.02); }
.radio-card.selected { border-color: var(--accent); background: #eff2ff; box-shadow: 0 4px 12px rgba(45,91,227,0.1); }
.radio-card input { display: none; }
.radio-card-title { font-weight: 800; font-size: 14px; }

.btn { 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 8px; 
  width: 100%; 
  padding: 14px; 
  border-radius: 12px; 
  font-family: 'Nunito', sans-serif; 
  font-weight: 800; 
  font-size: 16px; 
  cursor: pointer; 
  border: none; 
  transition: all 0.3s var(--ease); 
  background: var(--accent); 
  color: #fff;
  box-shadow: 0 8px 24px rgba(45,91,227,0.2);
  margin-top: 12px;
}
.btn:hover { background: #2450cc; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(45,91,227,0.3); }
.btn:active { transform: scale(0.98); }

.error-msg { color: #dc2626; font-size: 13px; margin-top: 16px; text-align: center; font-family: 'Space Mono', monospace; display: none; }
.success-msg { color: #16a34a; font-size: 14px; margin-top: 16px; text-align: center; font-weight: 700; display: none; }

.spinner { display:inline-block; width:16px; height:16px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite }
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="login-card">
  <a href="/user-login" class="back-btn">← Back to Login</a>
  <div class="logo">Event<span>Vault</span></div>
  <div class="subtitle">User Registration</div>
  
  <div class="form-grid">
    <div class="form-group full-width">
      <label>Full Name (Enter the name exactly as it should appear on the certificate)</label>
      <input type="text" id="reg-name" placeholder="Enter your full name">
    </div>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg-email" placeholder="email@example.com">
    </div>
    
    <div class="form-group">
      <label>USN / Reg No.</label>
      <input type="text" id="reg-usn" placeholder="Enter USN or REG NO.">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="reg-phone" placeholder="+91 XXXXXXXXXX">
    </div>
    <div class="form-group full-width">
      <label>Create Password</label>
      <input type="password" id="reg-pass" placeholder="••••••••">
    </div>
    <div class="form-group full-width">
      <label>I want to be a</label>
      <div class="radio-group">
        <label class="radio-card selected" id="rc-vol" onclick="selType('volunteer')">
          <input type="radio" name="user-type" value="volunteer" checked>
          <div class="radio-card-title">Volunteer</div>
        </label>
        <label class="radio-card" id="rc-part" onclick="selType('participant')">
          <input type="radio" name="user-type" value="participant">
          <div class="radio-card-title">Participant</div>
        </label>
      </div>
    </div>
  </div>
  
  <div id="signup-actions">
    <button class="btn" id="otp-btn" onclick="sendOTP()">
      <span id="otp-btn-text">Send Verification Code</span>
    </button>
  </div>

  <div id="otp-section" style="display:none; text-align:center; margin-top:20px">
    <div class="form-group full-width">
      <label>Enter 6-Digit Code</label>
      <div style="font-size:12px; color:var(--text2); margin-bottom:12px">Check your Gmail for OTP</div>
      <input type="text" id="otp-input" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:8px; font-size:24px; font-weight:bold">
    </div>
    <button class="btn" onclick="verifyOTP()">
      <span id="verify-btn-text">Verify & Create Account</span>
    </button>
    <p style="font-size:12px; color:var(--text2); margin-top:12px">Didn't get it? <a href="#" onclick="sendOTP()" style="color:var(--accent)">Resend Code</a></p>
  </div>
  
  <div id="error" class="error-msg"></div>
  <div id="success" class="success-msg">Account created successfully! Redirecting...</div>
</div>

<script>
let selectedType = 'volunteer';
let isVerified = false;

function selType(type) {
  selectedType = type;
  document.getElementById('rc-vol').classList.toggle('selected', type === 'volunteer');
  document.getElementById('rc-part').classList.toggle('selected', type === 'participant');
}

async function sendOTP() {
  const email = document.getElementById('reg-email').value.trim();
  const errEl = document.getElementById('error');
  const btnText = document.getElementById('otp-btn-text');
  
  const pass = document.getElementById('reg-pass').value;
  
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address';
    errEl.style.display = 'block';
    return;
  }

  // Password validation: min 8 chars, mixed alphabets, numbers, and special characters
  const passRegex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;
  if (!passRegex.test(pass)) {
    errEl.textContent = 'Password must be at least 8 characters and include a mix of alphabets, numbers, and special characters (symbols)';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  const originalText = btnText.textContent;
  btnText.innerHTML = '<span class="spinner"></span> Sending...';
  
  try {
    const r = await fetch('/api/auth/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed to send OTP');
    
    document.getElementById('signup-actions').style.display = 'none';
    document.getElementById('otp-section').style.display = 'block';
    alert('Verification code sent to your email!');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btnText.textContent = originalText;
  }
}

async function verifyOTP() {
  const email = document.getElementById('reg-email').value.trim();
  const otp = document.getElementById('otp-input').value.trim();
  const errEl = document.getElementById('error');
  const btnText = document.getElementById('verify-btn-text');
  
  if (!otp || otp.length !== 6) {
    errEl.textContent = 'Please enter the 6-digit verification code';
    errEl.style.display = 'block';
    return;
  }
  
  errEl.style.display = 'none';
  btnText.innerHTML = '<span class="spinner"></span> Verifying...';
  
  try {
    const r = await fetch('/api/auth/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Invalid code');
    
    isVerified = true;
    signup(); // Proceed to signup
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btnText.textContent = 'Verify & Create Account';
  }
}

async function signup() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const usn = document.getElementById('reg-usn').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const errEl = document.getElementById('error');
  const succEl = document.getElementById('success');
  
  if (!name || !email || !usn || !pass) {
    errEl.textContent = 'All fields are required';
    errEl.style.display = 'block';
    return;
  }
  
  try {
    // Submit to backend
    const r = await fetch('/api/auth/user-signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, usn, phone, type: selectedType })
    });
    
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Signup failed');
    
    document.getElementById('otp-section').style.display = 'none';
    succEl.style.display = 'block';
    sessionStorage.setItem('user_email', email);
    sessionStorage.setItem('user_usn', usn);
    
    setTimeout(() => {
      window.location.href = '/user-login';
    }, 2000);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    document.getElementById('verify-btn-text').textContent = 'Verify & Create Account';
  }
}
</script>

</body>
</html>
